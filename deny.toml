# AEGIS — zokastech.fr — https://zokastech.fr
# cargo-deny : graphe de dépendances Rust (RustSec, licences, sources).
# Documentation Embark : https://embarkstudios.github.io/cargo-deny/
# Intégration CI : .github/workflows/security.yml

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]
all-features = true

[advisories]
db-urls = ["https://github.com/RustSec/advisory-db"]
# « none » : pas d’échec sur les avis unmaintained (ex. paste via tokenizers) — aligné sur le défaut tolérant de cargo audit.
# Pour durcir : `workspace` ou `all`.
unmaintained = "none"

[licenses]
confidence-threshold = 0.85
allow = [
    "Apache-2.0",
    "MIT",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "Unicode-3.0",
    "CC0-1.0",
    "BSL-1.0",
    # webpki-roots (ureq / ort-sys)
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
