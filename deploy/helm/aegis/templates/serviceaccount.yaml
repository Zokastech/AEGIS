{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "aegis.serviceAccountName" . }}
  labels:
    {{- include "aegis.labels" . | nindent 4 }}
  annotations:
    {{- include "aegis.brandAnnotations" . | nindent 4 }}
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
