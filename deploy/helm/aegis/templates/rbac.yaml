# AEGIS — zokastech.fr — Apache 2.0 / MIT
{{- if and .Values.serviceAccount.create .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "aegis.fullname" . }}
  labels:
    {{- include "aegis.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
    resourceNames:
      - {{ include "aegis.fullname" . }}-policies
      {{- if .Values.gateway.configFiles }}
      - {{ include "aegis.fullname" . }}-gateway-config
      {{- end }}
      {{- if .Values.core.configMap.create }}
      - {{ include "aegis.fullname" . }}-core-config
      {{- end }}
  {{- if or .Values.gateway.secretEnv .Values.gateway.extraSecretData }}
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
    resourceNames:
      - {{ include "aegis.fullname" . }}-gateway-env
  {{- end }}
  {{- if and .Values.redis.enabled .Values.redis.auth.enabled }}
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
    resourceNames:
      - {{ include "aegis.fullname" . }}-redis
  {{- end }}
  {{- with .Values.rbac.extraRules }}
  {{- toYaml . | nindent 2 }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "aegis.fullname" . }}
  labels:
    {{- include "aegis.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "aegis.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "aegis.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
