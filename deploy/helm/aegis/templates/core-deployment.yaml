# AEGIS — zokastech.fr — Apache 2.0 / MIT
{{- if .Values.core.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aegis.fullname" . }}-core
  labels:
    {{- include "aegis.labels" . | nindent 4 }}
    app.kubernetes.io/component: core
  annotations:
    {{- include "aegis.brandAnnotations" . | nindent 4 }}
spec:
  replicas: {{ .Values.core.replicaCount }}
  selector:
    matchLabels:
      {{- include "aegis.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: core
  template:
    metadata:
      labels:
        {{- include "aegis.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: core
        {{- if .Values.podSecurity.labelRestricted }}
        security.zokastech.fr/pod-standard: restricted
        {{- end }}
      annotations:
        {{- include "aegis.brandAnnotations" . | nindent 8 }}
        {{- with .Values.core.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "aegis.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.core.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.core.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.core.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: core
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.core.image.repository }}:{{ .Values.core.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.core.image.pullPolicy }}
          {{- with .Values.core.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.core.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.core.resources | nindent 12 }}
          volumeMounts:
            - name: models
              mountPath: /opt/aegis/models
            {{- if or .Values.core.configMap.create .Values.core.configMap.name }}
            - name: core-config
              mountPath: /etc/aegis
              readOnly: true
            {{- end }}
      volumes:
        - name: models
          {{- if .Values.core.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "aegis.fullname" . }}-core-models
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if .Values.core.configMap.create }}
        - name: core-config
          configMap:
            name: {{ include "aegis.fullname" . }}-core-config
        {{- else if .Values.core.configMap.name }}
        - name: core-config
          configMap:
            name: {{ .Values.core.configMap.name | quote }}
        {{- end }}
{{- end }}
