# AEGIS — zokastech.fr — Apache 2.0 / MIT
{{- if .Values.networkPolicy.enabled }}
{{- $fullName := include "aegis.fullname" . -}}
{{- $sel := include "aegis.selectorLabels" . }}
{{- $ingNs := .Values.networkPolicy.allowIngressFromNamespace }}
---
{{- if and .Values.gateway.enabled .Values.networkPolicy.gateway }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullName }}-gateway
  labels:
    {{- include "aegis.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  podSelector:
    matchLabels:
      {{- $sel | nindent 6 }}
      app.kubernetes.io/component: gateway
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        {{- if $ingNs }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $ingNs | quote }}
        {{- else }}
        - namespaceSelector: {}
        {{- end }}
      ports:
        - protocol: TCP
          port: 8080
        {{- if .Values.gateway.grpc.enabled }}
        - protocol: TCP
          port: {{ .Values.gateway.grpc.port }}
        {{- end }}
  egress:
    {{- if .Values.networkPolicy.egressDNS }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- end }}
    {{- if .Values.redis.enabled }}
    - to:
        - podSelector:
            matchLabels:
              {{- $sel | nindent 14 }}
              app.kubernetes.io/component: redis
      ports:
        - protocol: TCP
          port: 6379
    {{- end }}
    {{- if .Values.core.enabled }}
    - to:
        - podSelector:
            matchLabels:
              {{- $sel | nindent 14 }}
              app.kubernetes.io/component: core
    {{- end }}
    {{- range .Values.networkPolicy.extraEgressCIDRs }}
    - to:
        - ipBlock:
            cidr: {{ . | quote }}
    {{- end }}
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.169.254/32
{{- end }}
---
{{- if and .Values.core.enabled .Values.networkPolicy.core }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullName }}-core
  labels:
    {{- include "aegis.labels" . | nindent 4 }}
    app.kubernetes.io/component: core
spec:
  podSelector:
    matchLabels:
      {{- $sel | nindent 6 }}
      app.kubernetes.io/component: core
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- $sel | nindent 14 }}
              app.kubernetes.io/component: gateway
  egress:
    {{- if .Values.networkPolicy.egressDNS }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- end }}
    - {}
{{- end }}
---
{{- if and .Values.dashboard.enabled .Values.networkPolicy.dashboard }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullName }}-dashboard
  labels:
    {{- include "aegis.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  podSelector:
    matchLabels:
      {{- $sel | nindent 6 }}
      app.kubernetes.io/component: dashboard
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        {{- if $ingNs }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $ingNs | quote }}
        {{- else }}
        - namespaceSelector: {}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.dashboard.containerPort }}
  egress:
    {{- if .Values.networkPolicy.egressDNS }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- end }}
    - to:
        - podSelector:
            matchLabels:
              {{- $sel | nindent 14 }}
              app.kubernetes.io/component: gateway
      ports:
        - protocol: TCP
          port: 8080
        {{- if .Values.gateway.grpc.enabled }}
        - protocol: TCP
          port: {{ .Values.gateway.grpc.port }}
        {{- end }}
    - {}
{{- end }}
---
{{- if and .Values.redis.enabled .Values.networkPolicy.redis }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullName }}-redis
  labels:
    {{- include "aegis.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  podSelector:
    matchLabels:
      {{- $sel | nindent 6 }}
      app.kubernetes.io/component: redis
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- $sel | nindent 14 }}
              app.kubernetes.io/component: gateway
      ports:
        - protocol: TCP
          port: 6379
  egress:
    {{- if .Values.networkPolicy.egressDNS }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
    {{- end }}
{{- end }}
{{- end }}
