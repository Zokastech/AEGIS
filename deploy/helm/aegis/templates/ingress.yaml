{{- if .Values.ingress.enabled -}}
{{- $fullName := include "aegis.fullname" . -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "aegis.labels" . | nindent 4 }}
  annotations:
    {{- include "aegis.brandAnnotations" . | nindent 4 }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ if eq .service "dashboard" }}{{ $fullName }}-dashboard{{ else }}{{ $fullName }}-gateway{{ end }}
                port:
                  number: {{ if eq .service "dashboard" }}{{ $.Values.dashboard.service.port }}{{ else }}{{ $.Values.gateway.service.port }}{{ end }}
          {{- end }}
    {{- end }}
{{- end }}
