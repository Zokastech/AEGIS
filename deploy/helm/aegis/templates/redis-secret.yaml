{{- if and .Values.redis.enabled .Values.redis.auth.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aegis.fullname" . }}-redis
  labels:
    {{- include "aegis.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
type: Opaque
stringData:
  redis-password: {{ required "redis.auth.password is required when redis.auth.enabled" .Values.redis.auth.password | quote }}
{{- end }}
