# AEGIS — zokastech.fr — Apache 2.0 / MIT
{{- if .Values.gateway.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aegis.fullname" . }}-gateway
  labels:
    {{- include "aegis.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
  annotations:
    {{- include "aegis.brandAnnotations" . | nindent 4 }}
spec:
  type: {{ .Values.gateway.service.type }}
  ports:
    - port: {{ .Values.gateway.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    {{- if .Values.gateway.grpc.enabled }}
    - port: {{ .Values.gateway.grpc.port }}
      targetPort: grpc
      protocol: TCP
      name: grpc
    {{- end }}
  selector:
    {{- include "aegis.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
{{- end }}
