# RGPD strict : PII masquées dans les réponses d’analyse, minimisation, pas de rétention mappings.

regulation: GDPR
name: gdpr-strict
version: "1"
description: >
  Masquage immédiat des PII dans les flux ; journalisation minimale côté politique ;
  aucune rétention des tables de pseudonymisation sans base légale.

retention:
  pseudonymization_mapping_days: 0
  audit_log_days: 90
  minimized_data_days: 0

entities:
  - type: EMAIL
    action: anonymize
    operator: mask
  - type: PHONE
    action: anonymize
    operator: mask
  - type: PERSON
    action: anonymize
    operator: replace
  - type: IBAN
    action: anonymize
    operator: redact
  - type: CREDIT_CARD
    action: anonymize
    operator: redact
  - type: SSN
    action: anonymize
    operator: redact
  - type: ADDRESS
    action: anonymize
    operator: replace
  - type: IP_ADDRESS
    action: anonymize
    operator: mask

automatic_actions:
  on_detect:
    - log_minimal
  on_violation:
    - block
    - alert

defaults:
  on_unknown_entity: log
  block_high_risk_combinations: true
  strip_response_entity_text: true

data_minimization:
  enabled: true
  strip_request_bodies_from_logs: true
  max_input_runes: 1000000
  strip_control_chars: true

rights:
  erasure_endpoint_enabled: true
  dpia_auto_report: true
