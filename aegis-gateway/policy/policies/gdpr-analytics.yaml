# AEGIS — zokastech.fr — Apache 2.0 / MIT
# Pseudonymisation pour analyses — base légale, DPIA et contrat de sous-traitance requis.

regulation: GDPR
name: gdpr-analytics
version: "1"
description: Pseudonymisation déterministe avec TTL contrôlé des mappings (utilité analytique préservée).

retention:
  pseudonymization_mapping_days: 30
  audit_log_days: 180
  minimized_data_days: 30

entities:
  - type: EMAIL
    action: anonymize
    operator: hash
  - type: PHONE
    action: anonymize
    operator: mask
  - type: PERSON
    action: anonymize
    operator: pseudonymize
  - type: IP_ADDRESS
    action: anonymize
    operator: mask

automatic_actions:
  on_detect:
    - log
  on_violation:
    - alert

defaults:
  on_unknown_entity: log
  block_high_risk_combinations: false
  strip_response_entity_text: false

data_minimization:
  enabled: true
  strip_request_bodies_from_logs: true
  max_input_runes: 500000
  strip_control_chars: true

rights:
  erasure_endpoint_enabled: true
  dpia_auto_report: true
