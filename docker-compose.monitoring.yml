# AEGIS — zokastech.fr — Apache 2.0 / MIT
# Observabilité : Prometheus + Grafana + Alertmanager.
#
# Prérequis : stack principale démarrée (réseau aegis-backend).
#   docker compose up -d --build
#   docker compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d
#
# Grafana : http://localhost:${GRAFANA_PORT:-3333} (admin / mot de passe .env)

name: aegis-monitoring

networks:
  monitoring:
    driver: bridge
  aegis-backend:
    external: true
    name: aegis-backend

volumes:
  prometheus_data:
  alertmanager_data:
  grafana_data:

services:
  prometheus:
    image: prom/prometheus:v2.52.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - prometheus_data:/prometheus
      - ./docker/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/monitoring/rules:/etc/prometheus/rules:ro
    networks:
      monitoring: {}
      aegis-backend: {}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9090/-/healthy"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 20s

  alertmanager:
    image: prom/alertmanager:v0.27.0
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    volumes:
      - alertmanager_data:/alertmanager
      - ./docker/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks:
      monitoring: {}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9093/-/healthy"]
      interval: 20s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:10.4.5
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change-me-grafana}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3333}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-3333}:3000"
    networks:
      monitoring: {}
    depends_on:
      - prometheus
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:3000/api/health >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
