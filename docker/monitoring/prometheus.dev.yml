# AEGIS — zokastech.fr — Apache 2.0 / MIT
# Scrape dev : passerelle en HTTP (AEGIS_INSECURE_HTTP=1 dans docker-compose.dev.yml).
# Utilisation : docker compose -f docker-compose.dev.yml up (services prometheus + grafana).

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: aegis-gateway
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets: ["aegis-gateway:8080"]
        labels:
          service: gateway
          stack: dev
