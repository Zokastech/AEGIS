# =============================================================================
# AEGIS — zokastech.fr — https://zokastech.fr
# CI principal : Rust (fmt + matrice stable/nightly × OS) + Go + SBOM Syft
# =============================================================================
# Analyse sécurité Rust (RustSec + licences / graphe) : workflow « Security »
# (.github/workflows/security.yml) — cargo audit, cargo deny (deny.toml).
# =============================================================================
# Bonnes pratiques :
# - permissions: contents: read (principe du moindre privilège)
# - actions épinglées par SHA (Supply-chain)
# - caches Cargo (Swatinem/rust-cache) et Go (cache intégré setup-go)
# =============================================================================
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Lecture seule : pas de mutation du dépôt depuis ce workflow.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Actions JS encore en Node 20 (ex. rust-toolchain, rust-cache) jusqu’à leurs mises à jour
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------------------------------------------------------------------------
  # rust-fmt : une seule exécution — rustfmt est déterministe, inutile de
  # multiplier les jobs (économie de minutes & bruit).
  # ---------------------------------------------------------------------------
  rust-fmt:
    name: Rust fmt
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # dtolnay/rust-toolchain — pin sur commit maître connu (évite tag mobile).
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
          components: rustfmt

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  # ---------------------------------------------------------------------------
  # rust-matrix : stable + nightly × ubuntu / macos / windows
  # - clippy avec -D warnings uniquement sur stable (nightly peut régresser).
  # - test + build --release sur toutes les combinaisons.
  # ---------------------------------------------------------------------------
  rust-matrix:
    name: Rust (${{ matrix.rust }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        rust: [stable, nightly]
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: ${{ matrix.rust }}
          components: clippy

      # Swatinem/rust-cache@v2 — partage des artefacts ~/.cargo entre jobs.
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          shared-key: ci-${{ matrix.os }}-${{ matrix.rust }}

      - name: cargo clippy (stable only)
        if: matrix.rust == 'stable'
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace

      - name: cargo build --release
        run: cargo build --workspace --release

      # Artefacts : binaire CLI principal (nom différent sous Windows).
      - name: Prepare binary artifact
        shell: bash
        run: |
          mkdir -p staging
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp target/release/aegis.exe staging/aegis-${{ matrix.os }}-${{ matrix.rust }}.exe
          else
            cp target/release/aegis staging/aegis-${{ matrix.os }}-${{ matrix.rust }}
          fi

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: aegis-cli-${{ matrix.os }}-${{ matrix.rust }}
          path: staging/
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # go-matrix : vet / test / build pour aegis-policy et aegis-gateway
  # ---------------------------------------------------------------------------
  go-matrix:
    name: Go (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # setup-go@v6.4.0 — cache modules si go.sum présent (sinon ignoré).
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: "1.23.10"
          cache: true
          cache-dependency-path: |
            aegis-gateway/go.sum
            aegis-policy/go.sum

      - name: aegis-policy — tidy, vet, test
        working-directory: aegis-policy
        run: |
          go mod tidy
          go vet ./...
          go test ./...

      - name: aegis-gateway — tidy, vet, test, build
        shell: bash
        working-directory: aegis-gateway
        run: |
          mkdir -p ../target
          go mod tidy
          go vet ./...
          go test ./...
          ext=""
          [[ "${{ runner.os }}" == "Windows" ]] && ext=".exe"
          go build -o "../target/go-aegis-gateway${ext}" ./cmd/aegis-gateway

      - name: Upload Go binaries
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: aegis-gateway-bin-${{ matrix.os }}
          path: target/go-aegis-gateway*
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # python-training : pytest sur le pipeline NER (dataset_builder, labels).
  # ---------------------------------------------------------------------------
  python-training:
    name: Python training (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install deps + pytest
        run: |
          python -m pip install -U pip
          pip install -r training/requirements.txt pytest

      - name: pytest training/tests
        run: pytest training/tests -q

  # ---------------------------------------------------------------------------
  # sbom : Syft (version pinnée) — SPDX JSON du dépôt pour la chaîne d’appro.
  # ---------------------------------------------------------------------------
  sbom:
    name: SBOM (Syft)
    runs-on: ubuntu-latest
    needs: [rust-fmt]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Syft (pinned version)
        env:
          SYFT_VERSION: 1.18.0
        run: |
          set -euxo pipefail
          curl -sSfL "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/syft_${SYFT_VERSION}_linux_amd64.tar.gz" | tar -xz -C /tmp
          sudo install -m 0755 /tmp/syft /usr/local/bin/syft
          syft version

      - name: Generate SBOM (SPDX JSON)
        run: |
          syft scan dir:. \
            -o spdx-json=aegis-sbom.spdx.json \
            --exclude './target/**' \
            --exclude './node_modules/**' \
            --exclude './.git/**'

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: sbom-spdx-json
          path: aegis-sbom.spdx.json
